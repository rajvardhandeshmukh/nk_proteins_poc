version: "3.8"

services:
  nk_proteins_ibm_gateway:
    build: .
    container_name: nk_proteins_ibm_gateway
    restart: unless-stopped
    ports:
      - "8100:8100"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
